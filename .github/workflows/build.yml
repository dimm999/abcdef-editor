name: Build and Release Alphas

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Список модулей для исключения (экономит до 100МБ)
  EXCLUDE_MODULES: "--exclude-module PySide6.QtWebEngine --exclude-module PySide6.QtWebEngineCore --exclude-module PySide6.QtWebEngineWidgets --exclude-module PySide6.QtMultimedia --exclude-module PySide6.QtMultimediaWidgets --exclude-module PySide6.QtCharts --exclude-module PySide6.QtDataVisualization --exclude-module PySide6.QtNetworkAuth --exclude-module PySide6.QtRemoteObjects --exclude-module PySide6.QtSensors --exclude-module PySide6.QtSerialPort --exclude-module PySide6.QtXml"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller
      - name: Build Windows
        run: |
          python -m PyInstaller --noconfirm --onedir --windowed --icon="logo.ico" --name="abcdef-editor" %EXCLUDE_MODULES% --add-data "main.qml;." --add-data "iAWriterDuoV.ttf;." --add-data "theme.json;." --add-data "theme-dark.json;." --add-data "logo.ico;." run.py
      - name: Copy config
        run: |
          Copy-Item settings.json dist/abcdef-editor/settings.json -Force
      - name: Create ZIP
        run: |
          Compress-Archive -Path dist/abcdef-editor -DestinationPath abcdef-editor-windows.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: abcdef-editor-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller
      - name: Build Linux
        run: |
          pyinstaller --noconfirm --onedir --windowed --name="abcdef-editor" $EXCLUDE_MODULES --add-data "main.qml:." --add-data "iAWriterDuoV.ttf:." --add-data "theme.json:." --add-data "theme-dark.json:." --add-data "logo.png:." run.py
          cp settings.json dist/abcdef-editor/settings.json
      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp -r dist/abcdef-editor/* AppDir/usr/bin/
          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/abcdef-editor" "$@"
          EOF
          chmod +x AppDir/AppRun
          cp logo.png AppDir/abcdef-editor.png
          ln -sf abcdef-editor.png AppDir/.DirIcon
          cat > AppDir/abcdef-editor.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=abcdef-editor
          Exec=abcdef-editor
          Icon=abcdef-editor
          Categories=Utility;
          Terminal=false
          EOF
          chmod +x AppDir/abcdef-editor.desktop
      - name: Generate AppImage
        run: |
          curl -L https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ./squashfs-root/AppRun AppDir abcdef-editor-linux.AppImage
      - uses: softprops/action-gh-release@v2
        with:
          files: abcdef-editor-linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller
      - name: Build macOS
        run: |
          pyinstaller --noconfirm --onedir --windowed --name="abcdef-editor" $EXCLUDE_MODULES --add-data "main.qml:." --add-data "iAWriterDuoV.ttf:." --add-data "theme.json:." --add-data "theme-dark.json:." --add-data "logo.png:." run.py
          # УДАЛЯЕМ ЛИШНЕЕ на macOS
          rm -rf dist/abcdef-editor.app/Contents/Frameworks/QtWebEngine*
          cp settings.json dist/abcdef-editor/settings.json || true
      - name: Create ZIP
        run: |
          cd dist
          zip -r ../abcdef-editor-macos.zip abcdef-editor.app
      - uses: softprops/action-gh-release@v2
        with:
          files: abcdef-editor-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}