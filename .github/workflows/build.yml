name: Build and Release Alphas

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ================= БЛОК СБОРКИ ПОД WINDOWS =================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller

      - name: Build Windows
        run: |
          pyinstaller --noconfirm --onedir --windowed --icon="logo.ico" --name="abcdef-editor" --add-data "main.qml;." --add-data "iAWriterDuoV.ttf;." --add-data "theme.json;." --add-data "theme-dark.json;." --add-data "logo.ico;." run.py

      - name: Copy config
        run: |
          Copy-Item settings.json dist/abcdef-editor/settings.json -Force

      - name: Create ZIP
        run: |
          Compress-Archive dist/abcdef-editor abcdef-editor-windows.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: abcdef-editor-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ================= БЛОК СБОРКИ ПОД LINUX (AppImage) =================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller

      - name: Build Linux
        run: |
          pyinstaller \
            --noconfirm \
            --onedir \
            --windowed \
            --name="abcdef-editor" \
            --add-data "main.qml:." \
            --add-data "iAWriterDuoV.ttf:." \
            --add-data "theme.json:." \
            --add-data "theme-dark.json:." \
            --add-data "logo.png:." \
            run.py
          cp settings.json dist/abcdef-editor/settings.json

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp -r dist/abcdef-editor/* AppDir/usr/bin/

          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/abcdef-editor" "$@"
          EOF
          chmod +x AppDir/AppRun

          cp logo.png AppDir/abcdef-editor.png
          ln -sf abcdef-editor.png AppDir/.DirIcon

          cat > AppDir/abcdef-editor.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=abcdef-editor
          Exec=abcdef-editor
          Icon=abcdef-editor
          Categories=Utility;
          Terminal=false
          EOF
          chmod +x AppDir/abcdef-editor.desktop

      - name: Generate AppImage
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          
          ./appimagetool --appimage-extract
          ./squashfs-root/AppRun AppDir abcdef-editor-linux.AppImage

      - uses: softprops/action-gh-release@v2
        with:
          files: abcdef-editor-linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ================= БЛОК СБОРКИ ПОД MACOS =================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller

      - name: Build macOS
        run: |
          pyinstaller \
            --noconfirm \
            --onedir \
            --windowed \
            --name="abcdef-editor" \
            --add-data "main.qml:." \
            --add-data "iAWriterDuoV.ttf:." \
            --add-data "theme.json:." \
            --add-data "theme-dark.json:." \
            --add-data "logo.png:." \
            run.py
          cp settings.json dist/abcdef-editor/settings.json || true

      - name: Create ZIP
        run: |
          cd dist
          zip -r ../abcdef-editor-macos.zip abcdef-editor.app

      - uses: softprops/action-gh-release@v2
        with:
          files: abcdef-editor-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}